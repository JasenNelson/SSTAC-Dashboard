name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint-and-typecheck:
    name: Lint & TypeScript Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run ESLint
        run: npm run lint

      - name: Generate Next.js types
        run: npx next typegen
      
      - name: TypeScript check
        run: npx tsc --noEmit

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v6
      
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      # Durable OOM fix (2026-06-12, /codex-review'd: Opus + codex gpt-5.5-xhigh GREEN).
      # The single-process v8-coverage run retains end-of-run coverage data proportional to the
      # TOTAL number of source modules covered across the whole suite, and intermittently
      # OOM-crashes the Node-24 worker with `write EPIPE` (no test summary) once the suite sits
      # near the heap ceiling -- observed on #290 and #305. maxWorkers=1 (vitest.config) and an
      # 8GB heap were ceiling-raises against a rising floor (suite + catalog grow every PR).
      # Fix: run vitest in 6 SEQUENTIAL shards -- each a FRESH node process covering ~1/6 of the
      # test files, so the retained coverage is bounded to ~1/6 and freed when the process exits.
      # Bumped 4 -> 6 on 2026-06-14/15: this lane keeps hitting the ceiling (#290, #305, and again
      # after another batch of tests landed) -- 4 shards no longer fit. STOPGAP, not a structural
      # cure: --shard splits TEST FILES not source modules and is order-sensitive, so a single
      # oversized test file (or two heavy modules co-located in one slice) can still blow a shard.
      # The durable fix (bigger-RAM runner, or move coverage off the required Unit gate into a
      # separate non-blocking job) is an owner decision. Escalation if 6 OOMs: 8 shards, never
      # maxWorkers=2 (known Node-20 OOM).
      # MUST stay a single "Unit Tests" job (not a matrix): branch protection requires the
      # "Unit Tests" check by name; a matrix would rename it to "Unit Tests (i)" and block all
      # PRs. maxWorkers=1 + the 8GB heap are retained for now (change one variable at a time).
      - name: Run unit tests (sharded -- fresh process per shard, per-shard coverage)
        run: |
          set -e
          for i in 1 2 3 4 5 6; do
            echo "::group::vitest shard $i/6"
            npm run test:ci -- --shard=$i/6 --coverage.reportsDirectory=coverage/shard-$i
            echo "::endgroup::"
          done
        env:
          NODE_OPTIONS: --max-old-space-size=8192

      # vitest.config coverage.reporter already includes 'json', so each shard writes a
      # non-empty coverage/shard-N/coverage-final.json. Codecov ingests + merges the 6 files in
      # one upload (a single flags: would apply to the whole upload, so none is set). Non-blocking
      # (fail_ci_if_error:false + continue-on-error) -- coverage never fails the gate.
      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v6
        with:
          files: ./coverage/shard-1/coverage-final.json,./coverage/shard-2/coverage-final.json,./coverage/shard-3/coverage-final.json,./coverage/shard-4/coverage-final.json,./coverage/shard-5/coverage-final.json,./coverage/shard-6/coverage-final.json
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
        continue-on-error: true

  build:
    name: Production Build
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          # Node 22 to match the Vercel deploy runtime (engines.node "22.x").
          # Build jobs must mirror production; CI cannot otherwise catch a
          # Vercel-only build/OOM failure (our GitHub build gate runs ~16GB).
          node-version: '22'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Verify environment variables are set
        run: |
          if [ -z "${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}" ]; then
            echo "ERROR: NEXT_PUBLIC_SUPABASE_URL secret is not set"
            exit 1
          fi
          if [ -z "${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}" ]; then
            echo "ERROR: NEXT_PUBLIC_SUPABASE_ANON_KEY secret is not set"
            exit 1
          fi
          echo "✓ Environment variables are set"
      
      - name: Build application
        run: npm run build
        env:
          # Add required environment variables
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          # Sentry env vars (optional - build will work without them)
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: build
    # Hard backstop so a stuck step can never hang for hours (default is 360 min).
    timeout-minutes: 25
    # NOTE: this job intentionally stays on Node 20 while lint/unit/build run on Node 24.
    # E2E validates the built APP in a browser, not the Node runtime -- the Node-version-sensitive
    # work (native modules, JS behavior, the production build) is covered by the Unit Tests and
    # Build jobs, both green on Node 24. On Node 24 the e2e environment hit a cascade of issues
    # (Playwright `--with-deps` apt postinst hang; then, in the Playwright container, browsers
    # crashing on launch ~1/3 of tests), none of which reflect app/runtime correctness. Keeping
    # e2e on Node 20 -- its known-good configuration -- is the pragmatic, well-scoped choice.
    # Revisit only if the Node-24 browser-launch issue is worth a dedicated fix.
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          PLAYWRIGHT_TEST_HOST: 127.0.0.1
          PLAYWRIGHT_TEST_PORT: 3100
          PLAYWRIGHT_TEST_BASE_URL: http://127.0.0.1:3100
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=moderate || true
        continue-on-error: true

  performance-analysis:
    name: Performance & Bundle Analysis
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          # Node 22 to match the Vercel deploy runtime: this job also runs
          # `npm run build`, so its bundle metrics must reflect the production
          # build, and a Node-24-only build path is not left in CI.
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build for analysis
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

      - name: Analyze bundle size
        run: |
          echo "## Bundle Size Analysis" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f .next/static/chunks/main*.js ]; then
            SHARED_SIZE=$(du -b .next/static/chunks/main*.js | awk '{sum += $1} END {printf "%.0f", sum/1024}')
            echo "**Shared JS Bundle:** ${SHARED_SIZE}KB" >> $GITHUB_STEP_SUMMARY
          fi

          if [ -f .next/BUILD_ID ]; then
            echo "**Build ID:** $(cat .next/BUILD_ID)" >> $GITHUB_STEP_SUMMARY
          fi

          TOTAL_SIZE=$(du -sb .next | awk '{printf "%.1f", $1/1024/1024}')
          echo "**Total Build Size:** ${TOTAL_SIZE}MB" >> $GITHUB_STEP_SUMMARY
        continue-on-error: true

      - name: Check for performance regressions
        run: |
          # Check if shared bundle is under 250KB target
          SHARED_KB=$(du -b .next/static/chunks/main*.js 2>/dev/null | awk '{sum += $1} END {printf "%.0f", sum/1024}')
          TARGET_KB=250

          if [ "$SHARED_KB" -gt "$TARGET_KB" ]; then
            echo "⚠️ Performance Warning: Shared bundle is ${SHARED_KB}KB (target: ${TARGET_KB}KB)"
          else
            echo "✓ Performance OK: Shared bundle is ${SHARED_KB}KB (target: ${TARGET_KB}KB)"
          fi
        continue-on-error: true

  load-test:
    name: Load Testing (K6)
    runs-on: ubuntu-latest
    needs: build
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check for K6 tests
        id: check_k6
        run: |
          if [ -f "tests/load/main.k6.js" ]; then
            echo "k6_exists=true" >> $GITHUB_OUTPUT
          else
            echo "k6_exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Install K6
        if: steps.check_k6.outputs.k6_exists == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y gnupg software-properties-common
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/grafana.gpg --keyserver keyserver.ubuntu.com --recv-keys 963FA27A28213892
          echo "deb [signed-by=/usr/share/keyrings/grafana.gpg] https://apt.grafana.com stable main" | sudo tee -a /etc/apt/sources.list.d/grafana.list
          sudo apt-get update
          sudo apt-get install -y k6
        continue-on-error: true

      - name: Run K6 load tests
        if: steps.check_k6.outputs.k6_exists == 'true'
        run: npm run test:k6
        continue-on-error: true
        env:
          K6_VUS: 10
          K6_DURATION: 30s

  status-check:
    name: CI Status Check
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, unit-tests, build, e2e-tests, performance-analysis]
    if: always()
    steps:
      - name: Check build status
        run: |
          if [ "${{ needs.lint-and-typecheck.result }}" = "failure" ] || \
             [ "${{ needs.unit-tests.result }}" = "failure" ] || \
             [ "${{ needs.build.result }}" = "failure" ] || \
             [ "${{ needs.e2e-tests.result }}" = "failure" ]; then
            echo "❌ CI Pipeline Failed"
            exit 1
          else
            echo "✅ CI Pipeline Passed"
          fi

      - name: Report status to job summary
        if: always()
        run: |
          echo "## CI/CD Pipeline Status" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Lint & TypeScript | ${{ needs.lint-and-typecheck.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Unit Tests | ${{ needs.unit-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| E2E Tests | ${{ needs.e2e-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Performance Analysis | ${{ needs.performance-analysis.result }} |" >> $GITHUB_STEP_SUMMARY

