name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint-and-typecheck:
    name: Lint & TypeScript Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run ESLint
        run: npm run lint

      - name: Generate Next.js types
        run: npx next typegen
      
      - name: TypeScript check
        run: npx tsc --noEmit

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v6

      # Node 22 (not 24): pin the Unit Tests job to Node 22 to match engines.node ("22.x"), the
      # Build/Perf jobs, and the Vercel production runtime. The Node 20 -> 24 bump introduced a v8
      # coverage memory regression that intermittently OOM-crashed the forked coverage worker with
      # `write EPIPE` / ForksPoolWorker.send / ChildProcess.emitWorkerError (recurred on #542, #543,
      # and #546 -- each cleared by a single SOP rerun, i.e. environmental, not content). Node 22 has
      # materially more coverage-memory headroom (it tolerated maxWorkers=2 historically). The
      # maxWorkers=1 cap (vitest.config), the 6 sequential shards below, and the 8GB heap are all
      # RETAINED as belt-and-suspenders -- change one variable at a time. Fallback if Node 22 ever
      # OOMs again: escalate to 8 shards (never maxWorkers=2).
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      # Durable OOM fix (2026-06-12, /codex-review'd: Opus + codex gpt-5.5-xhigh GREEN).
      # The single-process v8-coverage run retains end-of-run coverage data proportional to the
      # TOTAL number of source modules covered across the whole suite, and intermittently
      # OOM-crashes the Node-24 worker with `write EPIPE` (no test summary) once the suite sits
      # near the heap ceiling -- observed on #290 and #305. maxWorkers=1 (vitest.config) and an
      # 8GB heap were ceiling-raises against a rising floor (suite + catalog grow every PR).
      # Fix: run vitest in 6 SEQUENTIAL shards -- each a FRESH node process covering ~1/6 of the
      # test files, so the retained coverage is bounded to ~1/6 and freed when the process exits.
      # Bumped 4 -> 6 on 2026-06-14/15: this lane keeps hitting the ceiling (#290, #305, and again
      # after another batch of tests landed) -- 4 shards no longer fit. STOPGAP, not a structural
      # cure: --shard splits TEST FILES not source modules and is order-sensitive, so a single
      # oversized test file (or two heavy modules co-located in one slice) can still blow a shard.
      # The durable fix (bigger-RAM runner, or move coverage off the required Unit gate into a
      # separate non-blocking job) is an owner decision. Escalation if 6 OOMs: 8 shards, never
      # maxWorkers=2 (known Node-20 OOM).
      # MUST stay a single "Unit Tests" job (not a matrix): branch protection requires the
      # "Unit Tests" check by name; a matrix would rename it to "Unit Tests (i)" and block all
      # PRs. maxWorkers=1 + the 8GB heap are retained for now (change one variable at a time).
      - name: Run unit tests (sharded -- fresh process per shard, per-shard coverage)
        run: |
          set -e
          for i in 1 2 3 4 5 6; do
            echo "::group::vitest shard $i/6"
            npm run test:ci -- --shard=$i/6 --coverage.reportsDirectory=coverage/shard-$i
            echo "::endgroup::"
          done
        env:
          NODE_OPTIONS: --max-old-space-size=8192

      # vitest.config coverage.reporter already includes 'json', so each shard writes a
      # non-empty coverage/shard-N/coverage-final.json. Codecov ingests + merges the 6 files in
      # one upload (a single flags: would apply to the whole upload, so none is set). Non-blocking
      # (fail_ci_if_error:false + continue-on-error) -- coverage never fails the gate.
      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v6
        with:
          files: ./coverage/shard-1/coverage-final.json,./coverage/shard-2/coverage-final.json,./coverage/shard-3/coverage-final.json,./coverage/shard-4/coverage-final.json,./coverage/shard-5/coverage-final.json,./coverage/shard-6/coverage-final.json
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
        continue-on-error: true

  build:
    name: Production Build
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          # Node 22 to match the Vercel deploy runtime (engines.node "22.x").
          # Build jobs must mirror production; CI cannot otherwise catch a
          # Vercel-only build/OOM failure (our GitHub build gate runs ~16GB).
          node-version: '22'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Verify environment variables are set
        run: |
          if [ -z "${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}" ]; then
            echo "ERROR: NEXT_PUBLIC_SUPABASE_URL secret is not set"
            exit 1
          fi
          if [ -z "${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}" ]; then
            echo "ERROR: NEXT_PUBLIC_SUPABASE_ANON_KEY secret is not set"
            exit 1
          fi
          echo "✓ Environment variables are set"
      
      - name: Build application
        run: npm run build
        env:
          # Add required environment variables
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          # Sentry env vars (optional - build will work without them)
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    # 2026-07-06: was `needs: build`, but this job starts its own `next dev` webServer
    # (playwright.config.ts) and never consumes the Production Build job's `.next` output --
    # the dependency was pure ordering, not an artifact. Depending on unit-tests instead lets
    # E2E run in parallel with Production Build / Performance Analysis / Load Testing K6
    # instead of waiting for Build to finish first (verified: E2E is the pipeline's longest
    # job and was the tail of the critical path). Trade-off: E2E can now run even if
    # Production Build later fails -- CI-minute/noise cost, not a correctness risk, since the
    # final CI Status Check aggregator still requires both build and e2e-tests to pass.
    needs: unit-tests
    # Hard backstop so a stuck step can never hang for hours (default is 360 min).
    timeout-minutes: 30
    # Run inside the OFFICIAL Playwright container so browsers + system deps are PREBAKED and apt
    # never runs in this job. Root cause of the prior intermittent ~25-min CANCELLED runs (2026-06-18,
    # confirmed from step-level timing + codex consult): `npx playwright install --with-deps` hung in
    # the apt `needrestart` post-install hook until the job hit timeout-minutes, with the test step
    # SKIPPED. The container removes that failure class entirely (no `--with-deps`, no apt).
    #   - The image tag MUST match the @playwright/test version in package-lock.json; the version-check
    #     step below fails the build if they drift (bump BOTH together on a Playwright upgrade).
    #   - `--user 1001` is the image's pwuser, required so Chromium runs WITHOUT --no-sandbox (Chromium
    #     refuses to run as root without it); `--ipc=host` is Playwright's recommended Chromium flag.
    #   - Node still pinned to 20 (e2e's known-good runtime; Node-version-sensitive work is covered by
    #     the Node-24 Unit Tests + Build jobs). setup-node overrides PATH and does not conflict with the
    #     container's bundled Node. `cache: 'npm'` is intentionally omitted to avoid a cache-perm clash
    #     under --user 1001.
    container:
      image: mcr.microsoft.com/playwright:v1.56.1-jammy
      options: --user 1001 --ipc=host
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Verify Playwright package matches the container image tag
        # Fail loudly if @playwright/test (lockfile) drifts from the container image's baked browsers.
        # EXPECTED must equal the container image tag version above.
        run: |
          EXPECTED=1.56.1
          PKG=$(node -p "require('./package-lock.json').packages['node_modules/@playwright/test'].version")
          echo "lockfile @playwright/test=$PKG ; container image=v$EXPECTED"
          if [ "$PKG" != "$EXPECTED" ]; then
            echo "::error::@playwright/test $PKG != container image v$EXPECTED -- bump the mcr.microsoft.com/playwright image tag in ci.yml to match the lockfile"
            exit 1
          fi

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          PLAYWRIGHT_TEST_HOST: 127.0.0.1
          PLAYWRIGHT_TEST_PORT: 3100
          PLAYWRIGHT_TEST_BASE_URL: http://127.0.0.1:3100
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          E2E_TEST_EMAIL: ${{ secrets.E2E_TEST_EMAIL }}
          E2E_TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}
          # Authenticated E2E is OFF by default and stays skip-safe: playwright.config.ts
          # only adds the setup + chromium-auth projects when BOTH the E2E_TEST_* secrets
          # are present AND E2E_AUTH_ENABLED == 'true'. Driven by the repo variable
          # (unset -> '' -> disabled) rather than a hard-coded branch name, so no
          # experiment-branch coupling leaks onto main. Enablement strategy is owner-gated
          # (see Lane B plan U3); a controlled proof branch may set this locally.
          # PROOF-BRANCH TOGGLE (2026-07-11, throwaway -- do NOT merge): enable authenticated
          # E2E ONLY for the controlled proof branch/PR, so the R14 proof runs the previously
          # skip-safe Matrix Options / cyanide specs under chromium-auth. Main stays disabled
          # (vars.E2E_AUTH_ENABLED is unset); this line is reverted/abandoned with the proof branch.
          E2E_AUTH_ENABLED: ${{ github.head_ref == 'proof/e2e-auth-verify-2026-07-11' || github.ref_name == 'proof/e2e-auth-verify-2026-07-11' || vars.E2E_AUTH_ENABLED }}

      # Capture the Playwright report + per-test error-context/traces on failure so
      # e2e failures (e.g. the authenticated setup login) are diagnosable from CI.
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7
          if-no-files-found: ignore

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=moderate || true
        continue-on-error: true

  performance-analysis:
    name: Performance & Bundle Analysis
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          # Node 22 to match the Vercel deploy runtime: this job also runs
          # `npm run build`, so its bundle metrics must reflect the production
          # build, and a Node-24-only build path is not left in CI.
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build for analysis
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

      - name: Analyze bundle size
        run: |
          echo "## Bundle Size Analysis" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f .next/static/chunks/main*.js ]; then
            SHARED_SIZE=$(du -b .next/static/chunks/main*.js | awk '{sum += $1} END {printf "%.0f", sum/1024}')
            echo "**Shared JS Bundle:** ${SHARED_SIZE}KB" >> $GITHUB_STEP_SUMMARY
          fi

          if [ -f .next/BUILD_ID ]; then
            echo "**Build ID:** $(cat .next/BUILD_ID)" >> $GITHUB_STEP_SUMMARY
          fi

          TOTAL_SIZE=$(du -sb .next | awk '{printf "%.1f", $1/1024/1024}')
          echo "**Total Build Size:** ${TOTAL_SIZE}MB" >> $GITHUB_STEP_SUMMARY
        continue-on-error: true

      - name: Check for performance regressions
        run: |
          # Check if shared bundle is under 250KB target
          SHARED_KB=$(du -b .next/static/chunks/main*.js 2>/dev/null | awk '{sum += $1} END {printf "%.0f", sum/1024}')
          TARGET_KB=250

          if [ "$SHARED_KB" -gt "$TARGET_KB" ]; then
            echo "⚠️ Performance Warning: Shared bundle is ${SHARED_KB}KB (target: ${TARGET_KB}KB)"
          else
            echo "✓ Performance OK: Shared bundle is ${SHARED_KB}KB (target: ${TARGET_KB}KB)"
          fi
        continue-on-error: true

  load-test:
    name: Load Testing (K6)
    runs-on: ubuntu-latest
    needs: build
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check for K6 tests
        id: check_k6
        run: |
          if [ -f "tests/load/main.k6.js" ]; then
            echo "k6_exists=true" >> $GITHUB_OUTPUT
          else
            echo "k6_exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Install K6
        if: steps.check_k6.outputs.k6_exists == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y gnupg software-properties-common
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/grafana.gpg --keyserver keyserver.ubuntu.com --recv-keys 963FA27A28213892
          echo "deb [signed-by=/usr/share/keyrings/grafana.gpg] https://apt.grafana.com stable main" | sudo tee -a /etc/apt/sources.list.d/grafana.list
          sudo apt-get update
          sudo apt-get install -y k6
        continue-on-error: true

      - name: Run K6 load tests
        if: steps.check_k6.outputs.k6_exists == 'true'
        run: npm run test:k6
        continue-on-error: true
        env:
          K6_VUS: 10
          K6_DURATION: 30s

  status-check:
    name: CI Status Check
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, unit-tests, build, e2e-tests, performance-analysis]
    if: always()
    steps:
      - name: Check build status
        run: |
          if [ "${{ needs.lint-and-typecheck.result }}" = "failure" ] || \
             [ "${{ needs.unit-tests.result }}" = "failure" ] || \
             [ "${{ needs.build.result }}" = "failure" ] || \
             [ "${{ needs.e2e-tests.result }}" = "failure" ]; then
            echo "❌ CI Pipeline Failed"
            exit 1
          else
            echo "✅ CI Pipeline Passed"
          fi

      - name: Report status to job summary
        if: always()
        run: |
          echo "## CI/CD Pipeline Status" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Lint & TypeScript | ${{ needs.lint-and-typecheck.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Unit Tests | ${{ needs.unit-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| E2E Tests | ${{ needs.e2e-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Performance Analysis | ${{ needs.performance-analysis.result }} |" >> $GITHUB_STEP_SUMMARY

